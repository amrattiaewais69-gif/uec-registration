services:
  - type: web
    name: uec-registration
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node database/init.js && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: uec-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: RECEIPT_PREFIX
        value: UEC-2026-
      - key: RECEIPT_START_SEQ
        value: "1001"
      - key: MAX_CREDIT_HOURS
        value: "10"

databases:
  - name: uec-db
    plan: free
    databaseName: uec_summer_registration
