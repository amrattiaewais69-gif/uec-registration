<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Advising Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <div class="nav-brand">
            <img src="logo.png" class="uni-logo-nav" alt="University Logo">
            <h2>Academic Advisor Decision</h2>
        </div>
        <div>
            <span id="advisorIdentityName" style="margin-right:20px; font-weight:600;"></span>
            <button class="btn btn-danger" style="padding: 6px 14px;" onclick="logout()">Disconnect</button>
        </div>
    </div>

    <div class="container">
        <h3>Assigned Student Application Pipeline</h3>
        <p style="color:#64748b; margin-bottom:25px;">Review the curriculum combinations submitted by your assigned student cohort.</p>

        <table id="advisingTable">
            <thead>
                <tr>
                    <th>Student Specifications</th>
                    <th>Configured Course Array</th>
                    <th>Workload</th>
                    <th>Status</th>
                    <th>Advisory Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        const authToken = localStorage.getItem('sessionToken');
        const userRole = localStorage.getItem('userRole');

        if (!authToken || userRole !== 'supervisor') { window.location.href = 'index.html'; }
        document.getElementById('advisorIdentityName').innerText = "Dr. " + localStorage.getItem('displayName');

        async function apiCall(endpoint, method = 'GET', body = null) {
            const opts = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${authToken}`
                }
            };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(`${API_BASE}${endpoint}`, opts);
            return res.json();
        }

        async function pullPipeline() {
            try {
                const data = await apiCall('/supervisor/dashboard');
                if(!data.success) { alert(data.message); return; }

                const tbody = document.querySelector('#advisingTable tbody');
                tbody.innerHTML = '';

                data.requests.forEach(r => {
                    const tr = document.createElement('tr');
                    const isSubmitted = r.status === 'Submitted';
                    const isApproved = r.status === 'Approved by Supervisor';
                    const canPerformAction = isSubmitted || isApproved;

                    tr.innerHTML = `
                        <td><strong>${r.studentName}</strong><br><small style="color:#64748b;">ID: ${r.studentId} | Level: ${r.level}<br>Email: ${r.studentEmail || 'N/A'}</small></td>
                        <td>
                            <div style="max-width:400px; word-wrap:break-word; font-size:13px; color:#334155;">
                                <strong style="color:#4E4099;">Selected:</strong><br>${r.courses}
                                <br><br>
                                <strong style="color:#be123c;">Failed Courses:</strong><br>${r.failedCourses || 'None'}
                            </div>
                        </td>
                        <td><span class="badge">${r.totalCredits} CH</span></td>
                        <td><span style="font-weight:700; color:var(--primary-color);">${r.status}</span></td>
                        <td>
                            ${canPerformAction ? `
                                <input type="text" id="note-${r.requestId}" placeholder="Decision rationale..." style="margin-bottom:8px; padding:8px; font-size:13px; width:100%;">
                                <div style="display:flex; gap:5px; flex-wrap:wrap;">
                                    ${isSubmitted ? `
                                        <button class="btn btn-success" style="padding:5px 10px; font-size:12px;" onclick="executeReview('${r.requestId}', 'Approve')">Approve</button>
                                        <button class="btn btn-danger" style="padding:5px 10px; font-size:12px;" onclick="executeReview('${r.requestId}', 'Reject')">Reject</button>
                                    ` : ''}
                                    <button class="btn btn-warning" style="padding:5px 10px; font-size:12px;" onclick="executeReview('${r.requestId}', 'Return')">Return</button>
                                </div>
                            ` : `<span style="color:#94a3b8; font-size:13px; font-weight:500;">Evaluation Completed</span>`}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch(e) { alert("Failed to fetch supervisor data."); }
        }

        async function executeReview(id, actionToken) {
            const feedbackInput = document.getElementById(`note-${id}`).value.trim();
            if(!feedbackInput && actionToken !== 'Approve') {
                alert("You must enter a reason before returning or rejecting.");
                return;
            }

            try {
                const result = await apiCall('/supervisor/processAction', 'POST', {
                    requestId: id,
                    action: actionToken,
                    comments: feedbackInput,
                    email: localStorage.getItem('userEmail')
                });
                alert(result.message);
                pullPipeline();
            } catch(e) { alert("Error processing action."); }
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        window.onload = pullPipeline;
    </script>
</body>
</html>
